[build]
  publish = "dist"
  command = "npm run build"
[build.processing.html]
  pretty_urls = false
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "https://ceramiccnc.com/*"
  to = "https://www.ceramiccnc.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/FAQ/*"
  to = "/faq/"
  status = 301

[[redirects]]
  from = "/Contact/*"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/Terms/*"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/Termst/*"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/termst/*"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/category/EngineeringGuide/*"
  to = "/category/engineering-guide/"
  status = 301
